spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/realtime_caching_gateway
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

  data:
    redis:
      host: localhost
      port: 6379

app:
  redis:
    pubsub:
      enabled: false